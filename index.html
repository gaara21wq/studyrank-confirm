<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyRank</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #13111E, #1E1B2E);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #2A273F;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 {
      color: #7C6FF7;
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    p {
      color: #9B99B0;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      background: linear-gradient(135deg, #5B4FE9, #7C6FF7);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: none;
      background: #13111E;
      color: white;
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
    }
    .erro {
      color: #ff6b6b;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .sucesso {
      color: #6bffb8;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="emoji">📚</div>
    <h1 id="titulo">A carregar...</h1>
    <p id="descricao"></p>
    <div id="conteudo"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace('#', ''));

    const tipo = params.get('type') || hashParams.get('type');
    const erro = params.get('error') || hashParams.get('error');
    const errorCode = params.get('error_code') || hashParams.get('error_code');
    const accessToken = hashParams.get('access_token');

    const titulo = document.getElementById('titulo');
    const descricao = document.getElementById('descricao');
    const conteudo = document.getElementById('conteudo');

    // ── Link expirado ou inválido ──
    if (erro) {
      titulo.textContent = 'Link inválido';
      titulo.style.color = '#ff6b6b';
      document.querySelector('.emoji').textContent = '❌';
      descricao.textContent = errorCode === 'otp_expired'
        ? 'O link expirou. Volta à app e pede um novo link.'
        : 'Ocorreu um erro. Volta à app e tenta novamente.';
      conteudo.innerHTML = `<a class="btn" href="io.supabase.studyrank://login-callback">Abrir StudyRank</a>`;

    // ── Reset de password ──
    } else if (tipo === 'recovery' || accessToken) {
      titulo.textContent = 'Nova password';
      descricao.textContent = 'Introduz a tua nova password.';
      conteudo.innerHTML = `
        <input type="password" id="pass1" placeholder="Nova password" />
        <input type="password" id="pass2" placeholder="Confirmar password" />
        <div class="erro" id="erro">As passwords não coincidem ou são muito curtas (mín. 7 caracteres).</div>
        <div class="sucesso" id="sucesso">Password alterada! Já podes entrar na app.</div>
        <button class="btn" onclick="alterarPassword()">Guardar password</button>
      `;

    // ── Confirmação de conta ──
    } else {
      titulo.textContent = 'Conta Confirmada!';
      descricao.textContent = 'O teu email foi verificado com sucesso. Já podes entrar na app StudyRank e começar a estudar!';
      conteudo.innerHTML = `<a class="btn" href="io.supabase.studyrank://login-callback">Abrir StudyRank</a>`;
    }

    async function alterarPassword() {
      const pass1 = document.getElementById('pass1').value;
      const pass2 = document.getElementById('pass2').value;
      const erroDiv = document.getElementById('erro');
      const sucessoDiv = document.getElementById('sucesso');

      erroDiv.style.display = 'none';
      sucessoDiv.style.display = 'none';

      if (pass1.length < 7 || pass1 !== pass2) {
        erroDiv.style.display = 'block';
        return;
      }

      try {
        const SUPABASE_URL = 'https://ecwbxxjinjopnguygtgb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjd2J4eGppbmpvcG5ndXlndGdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc3NTk5NjcsImV4cCI6MjA2MzMzNTk2N30.j3tUnHQ07N_8Rf8-vfuCSJr9xBzKAkBJ1bGAmVnRkpo';

        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${accessToken}`,
          },
          body: JSON.stringify({ password: pass1 }),
        });

        if (res.ok) {
          sucessoDiv.style.display = 'block';
          document.getElementById('pass1').style.display = 'none';
          document.getElementById('pass2').style.display = 'none';
          document.querySelector('button').style.display = 'none';
        } else {
          erroDiv.textContent = 'Erro ao alterar a password. Tenta novamente.';
          erroDiv.style.display = 'block';
        }
      } catch (e) {
        erroDiv.textContent = 'Erro de ligação. Tenta novamente.';
        erroDiv.style.display = 'block';
      }
    }
  </script>
</body>
</html>
